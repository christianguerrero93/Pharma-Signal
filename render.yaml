# Render.com blueprint for the Pharma Signal Full DSP backend.
# Deploy: push to GitHub, then in Render "New > Blueprint" and pick this repo.
# Provisions a managed Postgres and a Docker web service wired to it.
databases:
  - name: pharma-signal-db
    databaseName: pharma_signal
    user: pharma_signal
    plan: free

services:
  - type: web
    name: pharma-signal-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: free
    envVars:
      # Use the managed Postgres above (falls back to SQLite if unset).
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-signal-db
          property: connectionString
      # Seed login password for the dev users. Set a real value in the dashboard.
      - key: FULL_DSP_DEV_PASSWORD
        sync: false
      # Secret used to sign HS256 login JWTs. Generate a strong random value.
      - key: FULL_DSP_JWT_SECRET
        generateValue: true
      # Restrict CORS to your frontend origin(s), comma-separated. Default "*".
      - key: CORS_ORIGINS
        sync: false
