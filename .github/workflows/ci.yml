name: Pharma Signal CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build

  backend-enterprise:
    name: Enterprise backend smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      # The smoke tests only exercise the FastAPI app surfaces, so install just
      # those dependencies instead of the full backend/requirements.txt (which
      # pins emergentintegrations, a package not available on public PyPI).
      - run: pip install fastapi uvicorn "pydantic>=2.6.4" httpx bcrypt
      - run: python -m py_compile backend/enterprise_server.py
      - run: python -m py_compile backend/full_dsp_server.py
      - name: Smoke test enterprise API
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, 'backend')
          from fastapi.testclient import TestClient
          from enterprise_server import app

          client = TestClient(app)
          health = client.get('/health')
          assert health.status_code == 200, health.text

          dashboard = client.get('/api/v2/executive-dashboard', headers={'x-pharma-role': 'ceo'})
          assert dashboard.status_code == 200, dashboard.text
          assert dashboard.json()['total_budget'] > 0

          narrative = client.get('/api/v2/board/narrative', headers={'x-pharma-role': 'ceo'})
          assert narrative.status_code == 200, narrative.text

          print('enterprise backend smoke test passed')
          PY
      - name: Smoke test full DSP API
        env:
          FULL_DSP_DB: /tmp/pharma_signal_ci.db
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, 'backend')
          from fastapi.testclient import TestClient
          from full_dsp_server import app

          client = TestClient(app)
          assert client.get('/health').json()['status'] == 'ok'

          token = client.post('/api/full/auth/login', json={'email': 'admin@pharmasignal.local', 'password': 'pharma-signal-local'}).json()['access_token']
          headers = {'Authorization': f'Bearer {token}'}

          build = client.post('/api/full/campaign-build', headers=headers, json={
              'campaign': {'name': 'CI Launch', 'brand': 'TZIELD', 'indication': 'T1D delay', 'audience_type': 'DTC', 'objective': 'lift', 'budget': 500000, 'flight_start': '2026-07-01', 'flight_end': '2026-12-31', 'status': 'active'},
              'line_items': [{'name': 'Display', 'channel': 'Display', 'budget': 250000, 'max_bid_cpm': 24, 'pacing_mode': 'even', 'status': 'active', 'frequency_cap': 3}],
          })
          assert build.status_code == 200, build.text
          line_id = build.json()['line_items'][0]['id']
          campaign_id = build.json()['campaign_id']

          aud_id = client.get('/api/full/audiences', headers=headers).json()[0]['id']
          fc = client.post('/api/full/audiences/forecast', headers=headers, json={'audience_id': aud_id, 'budget': 250000, 'cpm': 24, 'frequency_cap': 3, 'flight_days': 30})
          assert fc.status_code == 200 and fc.json()['unique_reach'] > 0, fc.text

          sim = client.post('/api/full/bidstream/simulate', headers=headers, json={'line_item_id': line_id, 'requests': 500, 'seed': 1, 'phi_leak_rate': 0.05})
          assert sim.status_code == 200 and sim.json()['phi_blocked'] >= 0, sim.text

          mp = client.post('/api/full/measurement/plan', headers=headers, json={'campaign_id': campaign_id, 'study_type': 'script_lift', 'baseline_rate': 0.02, 'expected_lift_pct': 15, 'exposed_size': 80000, 'control_size': 80000})
          assert mp.status_code == 200 and 0 <= mp.json()['power'] <= 1, mp.text

          results = client.post(f"/api/full/measurement/{mp.json()['id']}/results", headers=headers, json={'exposed_n': 80000, 'exposed_conversions': 1840, 'control_n': 80000, 'control_conversions': 1600, 'media_spend': 250000, 'rx_value_per_conversion': 3000})
          assert results.status_code == 200 and results.json()['significant'] is True, results.text

          auds = client.get('/api/full/audiences', headers=headers).json()
          overlap = client.post('/api/full/audiences/overlap', headers=headers, json={'audience_ids': [auds[0]['id'], auds[1]['id']]})
          assert overlap.status_code == 200 and overlap.json()['deduplicated_unique_reach'] > 0, overlap.text

          rtb = client.post(f'/api/full/rtb/bid?line_item_id={line_id}', headers=headers, json={'id': 'ci-req', 'imp': [{'id': '1', 'bidfloor': 4.0, 'banner': {'w': 300, 'h': 250}}], 'device': {'geo': {'country': 'USA'}}, 'user': {'consent': True}})
          assert rtb.status_code == 200, rtb.text
          wid = rtb.json()['seatbid'][0]['bid'][0]['id']
          assert client.get(f'/api/full/rtb/win?wid={wid}&price=6.5').status_code == 200
          assert client.get(f'/api/full/rtb/billing?wid={wid}').status_code == 200

          connectors = client.get('/api/full/connectors', headers=headers).json()
          ssp = [x for x in connectors if x['kind'] == 'ssp'][0]
          sync = client.post(f"/api/full/connectors/{ssp['id']}/sync?days=14", headers=headers)
          assert sync.status_code == 200 and sync.json()['facts_ingested'] > 0, sync.text
          rep = client.get('/api/full/reporting/performance?days=14', headers=headers)
          assert rep.status_code == 200 and rep.json()['source'] == 'live', rep.text

          tgt = client.put(f'/api/full/line-items/{line_id}/targeting', headers=headers, json={'devices': ['ctv'], 'geos': ['US-CA'], 'dayparts': [18, 19, 20], 'brand_safety': 'pharma_sensitive', 'viewability_target': 0.8})
          assert tgt.status_code == 200 and tgt.json()['brand_safety'] == 'pharma_sensitive', tgt.text
          got = client.get(f'/api/full/line-items/{line_id}/targeting', headers=headers)
          assert got.status_code == 200 and got.json()['devices'] == ['ctv'], got.text

          plan = client.post('/api/full/planner', headers=headers, json={'budget': 1000000, 'frequency': 3})
          assert plan.status_code == 200 and plan.json()['totals']['impressions'] > 0, plan.text

          sim = client.post('/api/full/bidstream/simulate', headers=headers, json={'line_item_id': line_id, 'requests': 500, 'seed': 3})
          assert sim.status_code == 200 and 'carried_over_users' in sim.json(), sim.text
          fstate = client.get(f'/api/full/frequency/state/{line_id}', headers=headers)
          assert fstate.status_code == 200 and 'avg_frequency' in fstate.json(), fstate.text
          csvr = client.get('/api/full/export?dataset=campaigns', headers=headers)
          assert csvr.status_code == 200 and 'name' in csvr.text, csvr.text

          for path in ['/api/full/overview', '/api/full/optimizer/portfolio', '/api/full/supply-paths/optimize', '/api/full/compliance/scan', '/api/full/frequency/governance', '/api/full/measurement/results', '/api/full/connectors/facts', '/api/full/rtb/wins', '/api/full/insights', '/api/full/channels']:
              r = client.get(path, headers=headers)
              assert r.status_code == 200, f'{path}: {r.text}'

          print('full DSP backend smoke test passed')
          PY
